[pytest]
# ─────────────────────────────────────────────────────────────────────────────
# Playwright + Pytest Configuration
# Author : Surya Kulshreshtha
# Purpose: Central config for test discovery, markers, reporting & timeouts
# ─────────────────────────────────────────────────────────────────────────────

addopts =
    --html=reports/report.html
    --self-contained-html
    --tb=short
    -v
    --strict-markers
    --reruns=1
    --reruns-delay=2

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Custom markers — every marker used in tests MUST be declared here
markers =
    smoke:        Fast, critical path tests — run on every commit
    regression:   Full suite — run before release
    ui:           Browser-based UI tests
    api:          API / HTTP layer tests
    e2e:          End-to-end flow tests
    slow:         Tests that take > 30 seconds
    sanity:       Quick sanity checks post-deployment
    login:        Tests covering auth / login flows
    data_driven:  Tests that read data from external sources

# Timeout (seconds) for each individual test
timeout = 60

# Log settings
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
